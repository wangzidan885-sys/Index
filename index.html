<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的展示页</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            text-align:center;
            padding:50px;
        }

        .card{
            background:white;
            max-width:600px;
            margin:auto;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        img{
            width:100%;
            border-radius:12px;
        }

        h1{
            margin-top:20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://picsum.photos/600/300">

        <h1>我的作品展示</h1>

        <p>
            这里可以放你的游戏武器设计、
            PBR作品、个人介绍等等。
        </p>
    </div>

</body>
</html>
