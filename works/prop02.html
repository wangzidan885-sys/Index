本作品是一把融合暗黑奇幻与野蛮暴力美学的重型武器。
双刃斧头采用破损做旧的金属材质，
通过硬表面建模与PBR流程精细刻画了刀刃的划痕与锈蚀纹理，
呈现出久经沙场的厚重感。
